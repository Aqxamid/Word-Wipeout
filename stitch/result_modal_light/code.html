<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Curator - Victory Reveal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#004395",
                        "on-secondary-fixed": "#191c1f",
                        "outline-variant": "#c2c6d6",
                        "on-tertiary-fixed-variant": "#723600",
                        "on-surface-variant": "#424754",
                        "surface-container-highest": "#e0e3e5",
                        "secondary-container": "#dee0e4",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary": "#924700",
                        "surface-variant": "#e0e3e5",
                        "background": "#f7f9fb",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "surface-container": "#eceef0",
                        "on-tertiary-fixed": "#311400",
                        "on-surface": "#191c1e",
                        "surface-container-high": "#e6e8ea",
                        "primary": "#0058be",
                        "error-container": "#ffdad6",
                        "secondary": "#5c5f62",
                        "on-secondary-container": "#606366",
                        "primary-container": "#2170e4",
                        "on-primary-container": "#fefcff",
                        "outline": "#727785",
                        "surface-bright": "#f7f9fb",
                        "tertiary-fixed": "#ffdcc6",
                        "tertiary-container": "#b75b00",
                        "on-secondary-fixed-variant": "#44474a",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#adc6ff",
                        "primary-fixed-dim": "#adc6ff",
                        "primary-fixed": "#d8e2ff",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#001a42",
                        "on-background": "#191c1e",
                        "secondary-fixed": "#e0e2e6",
                        "inverse-on-surface": "#eff1f3",
                        "surface": "#f7f9fb",
                        "on-tertiary-container": "#fffbff",
                        "inverse-surface": "#2d3133",
                        "secondary-fixed-dim": "#c4c7ca",
                        "surface-tint": "#005ac2",
                        "surface-dim": "#d8dadc",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb786"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/80 backdrop-blur-md dark:bg-slate-900/80 fixed top-0 w-full z-50">
<div class="flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center">
<span class="material-symbols-outlined text-slate-500">menu</span>
</div>
<div class="text-xl font-extrabold tracking-tighter text-slate-900 dark:text-white">Curator</div>
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined text-blue-600 font-bold" data-icon="leaderboard">leaderboard</span>
</div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center px-4 pt-16 pb-24">
<!-- Result Modal (Integrated as an Elevated Card) -->
<div class="w-full max-w-lg bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_rgba(25,28,30,0.04)] p-8 md:p-12 text-center relative overflow-hidden">
<!-- Header Section -->
<div class="mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
</div>
<h1 class="text-4xl md:text-5xl font-extrabold text-on-surface tracking-tight mb-2">YOU WIN!</h1>
<p class="text-on-surface-variant font-medium">Exquisite vocabulary, curator.</p>
</div>
<!-- Reveal Section: PIXEL -->
<div class="flex justify-center gap-2 mb-10">
<div class="w-12 h-12 md:w-16 md:h-16 flex items-center justify-center bg-primary text-on-primary rounded-full shadow-lg shadow-primary/20 text-xl md:text-2xl font-bold">P</div>
<div class="w-12 h-12 md:w-16 md:h-16 flex items-center justify-center bg-primary text-on-primary rounded-full shadow-lg shadow-primary/20 text-xl md:text-2xl font-bold">I</div>
<div class="w-12 h-12 md:w-16 md:h-16 flex items-center justify-center bg-primary text-on-primary rounded-full shadow-lg shadow-primary/20 text-xl md:text-2xl font-bold">X</div>
<div class="w-12 h-12 md:w-16 md:h-16 flex items-center justify-center bg-primary text-on-primary rounded-full shadow-lg shadow-primary/20 text-xl md:text-2xl font-bold">E</div>
<div class="w-12 h-12 md:w-16 md:h-16 flex items-center justify-center bg-primary text-on-primary rounded-full shadow-lg shadow-primary/20 text-xl md:text-2xl font-bold">L</div>
</div>
<!-- Stats Bento Grid -->
<div class="grid grid-cols-2 gap-4 mb-10">
<div class="bg-surface-container-low rounded-full py-6 px-4">
<div class="text-3xl font-extrabold text-primary mb-1">4/6</div>
<div class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Attempts</div>
</div>
<div class="bg-surface-container-low rounded-full py-6 px-4 border-2 border-tertiary-fixed-dim">
<div class="text-3xl font-extrabold text-tertiary mb-1 flex items-center justify-center gap-1">
                        13
                        <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<div class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Streak</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 px-8 rounded-full font-bold text-lg shadow-lg shadow-primary/20 active:scale-95 transition-all">
                    Play Again
                </button>
<button class="w-full bg-secondary-fixed-dim text-on-secondary-fixed py-4 px-8 rounded-full font-bold text-lg active:scale-95 transition-all">
                    Change Mode
                </button>
</div>
<!-- Visual Flare -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-12 -left-12 w-32 h-32 bg-tertiary/5 rounded-full blur-3xl"></div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-0 right-0 z-50 flex justify-around items-center px-4 md:hidden">
<div class="bg-white/70 backdrop-blur-xl dark:bg-slate-900/70 w-[90%] max-w-md rounded-full shadow-[0_12px_32px_rgba(25,28,30,0.04)] flex justify-around items-center py-2">
<a class="flex items-center justify-center text-slate-400 p-4 hover:text-blue-500 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
</a>
<a class="flex items-center justify-center bg-blue-600 text-white rounded-full p-4 scale-110 shadow-lg shadow-blue-500/20" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard" style="font-variation-settings: 'FILL' 1;">leaderboard</span>
</a>
<a class="flex items-center justify-center text-slate-400 p-4 hover:text-blue-500 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
<a class="flex items-center justify-center text-slate-400 p-4 hover:text-blue-500 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
</a>
</div>
</nav>
<!-- Desktop Sidebar/Overlay logic represented by bottom bar being hidden on MD+ -->
</body></html>
