<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "secondary": "#bcc7de",
                  "surface-container": "#171f33",
                  "primary": "#a4c9ff",
                  "on-background": "#dae2fd",
                  "surface": "#0b1326",
                  "tertiary-fixed-dim": "#fabd34",
                  "tertiary": "#fabd34",
                  "inverse-primary": "#0060ac",
                  "on-primary-container": "#003a6b",
                  "tertiary-fixed": "#ffdea4",
                  "on-secondary-container": "#aeb9d0",
                  "error": "#ffb4ab",
                  "outline-variant": "#414751",
                  "outline": "#8b919d",
                  "secondary-fixed-dim": "#bcc7de",
                  "on-error-container": "#ffdad6",
                  "surface-container-high": "#222a3d",
                  "primary-container": "#60a5fa",
                  "on-secondary-fixed": "#111c2d",
                  "on-primary": "#00315d",
                  "surface-container-highest": "#2d3449",
                  "secondary-fixed": "#d8e3fb",
                  "surface-container-low": "#131b2e",
                  "surface-tint": "#a4c9ff",
                  "on-secondary": "#263143",
                  "on-primary-fixed-variant": "#004883",
                  "on-tertiary-container": "#4b3500",
                  "inverse-surface": "#dae2fd",
                  "on-primary-fixed": "#001c39",
                  "surface-variant": "#2d3449",
                  "on-surface": "#dae2fd",
                  "on-tertiary": "#412d00",
                  "on-surface-variant": "#c1c7d3",
                  "on-error": "#690005",
                  "secondary-container": "#3e495d",
                  "surface-dim": "#0b1326",
                  "background": "#0b1326",
                  "tertiary-container": "#d19900",
                  "surface-bright": "#31394d",
                  "primary-fixed-dim": "#a4c9ff",
                  "on-tertiary-fixed": "#261900",
                  "primary-fixed": "#d4e3ff",
                  "on-secondary-fixed-variant": "#3c475a",
                  "inverse-on-surface": "#283044",
                  "error-container": "#93000a",
                  "surface-container-lowest": "#060e20",
                  "on-tertiary-fixed-variant": "#5d4200"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Plus Jakarta Sans"],
                  "label": ["Plus Jakarta Sans"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      background: rgba(45, 52, 73, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Background Layer (Simulated Game Board) -->
<div class="fixed inset-0 z-0 flex flex-col items-center justify-center opacity-30 grayscale pointer-events-none">
<header class="flex justify-between items-center px-6 h-16 w-full fixed top-0 bg-[#0b1326]">
<div class="text-xl font-black text-[#a4c9ff] tracking-tighter">Curator</div>
<div class="flex items-center gap-2 text-[#a4c9ff] font-bold">12 🔥</div>
</header>
<div class="grid grid-cols-5 gap-3 p-4">
<!-- Row 1 -->
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">T</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">R</div>
<div class="w-14 h-14 bg-tertiary rounded-md flex items-center justify-center text-2xl font-bold text-on-tertiary">I</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">A</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">L</div>
<!-- Row 2 -->
<div class="w-14 h-14 bg-tertiary rounded-md flex items-center justify-center text-2xl font-bold text-on-tertiary">P</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">O</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">U</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">N</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">D</div>
<!-- Row 3 -->
<div class="w-14 h-14 bg-tertiary rounded-md flex items-center justify-center text-2xl font-bold text-on-tertiary">P</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">L</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">A</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">T</div>
<div class="w-14 h-14 bg-surface-container-highest rounded-md flex items-center justify-center text-2xl font-bold">E</div>
<!-- Row 4 (Winning) -->
<div class="w-14 h-14 bg-tertiary rounded-md flex items-center justify-center text-2xl font-bold text-on-tertiary">P</div>
<div class="w-14 h-14 bg-tertiary rounded-md flex items-center justify-center text-2xl font-bold text-on-tertiary">I</div>
<div class="w-14 h-14 bg-tertiary rounded-md flex items-center justify-center text-2xl font-bold text-on-tertiary">X</div>
<div class="w-14 h-14 bg-tertiary rounded-md flex items-center justify-center text-2xl font-bold text-on-tertiary">E</div>
<div class="w-14 h-14 bg-tertiary rounded-md flex items-center justify-center text-2xl font-bold text-on-tertiary">L</div>
</div>
</div>
<!-- Overlay -->
<div class="fixed inset-0 bg-surface/60 backdrop-blur-sm z-40 flex items-center justify-center p-6">
<!-- Modal Card -->
<div class="relative w-full max-w-md glass-effect rounded-lg overflow-hidden shadow-[0_20px_40px_-5px_rgba(0,0,0,0.4)] border border-outline-variant/15 flex flex-col items-center pt-12 pb-10 px-8">
<!-- Celebration Glow -->
<div class="absolute -top-24 w-64 h-64 bg-primary/20 blur-[80px] rounded-full"></div>
<!-- Icon/Symbol -->
<div class="relative mb-6">
<div class="p-4 bg-tertiary/10 rounded-full">
<span class="material-symbols-outlined text-tertiary text-5xl" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
</div>
<!-- Headline -->
<h1 class="text-4xl font-extrabold tracking-tight mb-2 text-on-surface">YOU WIN!</h1>
<p class="text-on-surface-variant font-medium mb-8">The curator is impressed.</p>
<!-- Correct Word Display -->
<div class="flex gap-2 mb-10">
<div class="w-12 h-16 bg-surface-container-highest rounded-lg flex items-center justify-center border border-primary/20 shadow-lg">
<span class="text-2xl font-black text-primary">P</span>
</div>
<div class="w-12 h-16 bg-surface-container-highest rounded-lg flex items-center justify-center border border-primary/20 shadow-lg">
<span class="text-2xl font-black text-primary">I</span>
</div>
<div class="w-12 h-16 bg-surface-container-highest rounded-lg flex items-center justify-center border border-primary/20 shadow-lg">
<span class="text-2xl font-black text-primary">X</span>
</div>
<div class="w-12 h-16 bg-surface-container-highest rounded-lg flex items-center justify-center border border-primary/20 shadow-lg">
<span class="text-2xl font-black text-primary">E</span>
</div>
<div class="w-12 h-16 bg-surface-container-highest rounded-lg flex items-center justify-center border border-primary/20 shadow-lg">
<span class="text-2xl font-black text-primary">L</span>
</div>
</div>
<!-- Performance Stats -->
<div class="w-full grid grid-cols-2 gap-4 mb-10">
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col items-center justify-center text-center">
<span class="text-label-sm uppercase tracking-widest text-outline text-[10px] mb-1">Attempts</span>
<span class="text-2xl font-bold text-on-surface">4 / 6</span>
</div>
<div class="bg-surface-container-low rounded-xl p-4 flex flex-col items-center justify-center text-center">
<span class="text-label-sm uppercase tracking-widest text-outline text-[10px] mb-1">Streak</span>
<div class="flex items-center gap-1">
<span class="text-2xl font-bold text-on-surface">13</span>
<span class="material-symbols-outlined text-tertiary text-xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="w-full space-y-3">
<button class="w-full h-14 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-extrabold text-lg flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
<span>Play Again</span>
<span class="material-symbols-outlined">refresh</span>
</button>
<button class="w-full h-14 rounded-full bg-surface-container-high text-on-surface font-semibold text-base flex items-center justify-center gap-2 hover:bg-surface-container-highest transition-colors">
<span>Change Mode</span>
<span class="material-symbols-outlined text-sm">settings_input_component</span>
</button>
</div>
<!-- Extra Context / Share -->
<button class="mt-6 text-primary text-sm font-bold flex items-center gap-1 hover:underline underline-offset-4">
<span>SHARE RESULTS</span>
<span class="material-symbols-outlined text-sm">share</span>
</button>
</div>
</div>
<!-- Hidden Bottom Navigation (Suppressed per task guidelines for result screen) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-[#0b1326]/80 backdrop-blur-xl rounded-t-3xl shadow-[0_-20px_40px_-5px_rgba(255,255,255,0.06)] opacity-10 grayscale pointer-events-none">
<div class="flex items-center justify-center bg-[#171f33] text-[#a4c9ff] rounded-full p-3">
<span class="material-symbols-outlined">grid_view</span>
</div>
<div class="flex items-center justify-center text-[#2d3449] p-3">
<span class="material-symbols-outlined">leaderboard</span>
</div>
<div class="flex items-center justify-center text-[#2d3449] p-3">
<span class="material-symbols-outlined">settings</span>
</div>
<div class="flex items-center justify-center text-[#2d3449] p-3">
<span class="material-symbols-outlined">person</span>
</div>
</nav>
</body></html>
